name: Sync to COSS

on:
  push:
    branches:
      - master  # Triggers on any commit or merge to master

jobs:
  mirror_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to fetch all history for mirroring

      - name: Push to COSS Repository
        env:
          DEST_ORG: "Centre-for-Open-Societal-Systems"
          DEST_REPO: "OpenAgriNet-Ethiopia"
          # PAT in repo Settings → Secrets and variables → Actions → DEST_REPO_TOKEN
          SYNC_TOKEN: ${{ secrets.DEST_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          if [ -z "${SYNC_TOKEN}" ]; then
            echo "::error::DEST_REPO_TOKEN secret is empty or not set."
            exit 1
          fi

          # Verify token and repo access before git push (clearer than generic "repository not found")
          API_URL="https://api.github.com/repos/${DEST_ORG}/${DEST_REPO}"
          HTTP_CODE=$(curl -sS -o /tmp/gh_repo.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${SYNC_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}")

          case "${HTTP_CODE}" in
            200)
              echo "GitHub API: repository exists and token can read it."
              ;;
            401)
              echo "::error::DEST_REPO_TOKEN rejected (401). Regenerate the PAT and update the secret."
              exit 1
              ;;
            403)
              echo "::error::Token forbidden (403). For orgs with SAML SSO, authorize this PAT for the org. Fine-grained tokens need Contents: Read and write on this repository."
              exit 1
              ;;
            404)
              echo "::error::Repo GET returned 404. Either the repo does not exist at https://github.com/${DEST_ORG}/${DEST_REPO}, the name/org is wrong, or the token cannot see it (private repo + no access). Create the repo under the org or fix DEST_ORG/DEST_REPO."
              if [ -s /tmp/gh_repo.json ]; then
                head -c 500 /tmp/gh_repo.json || true
                echo
              fi
              exit 1
              ;;
            *)
              echo "::error::Unexpected GitHub API response: HTTP ${HTTP_CODE}"
              head -c 500 /tmp/gh_repo.json || true
              echo
              exit 1
              ;;
          esac

          # Avoid embedding the PAT in the remote URL (special characters in PATs break URLs).
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "${SYNC_TOKEN}" > ~/.git-credentials
          chmod 600 ~/.git-credentials

          git remote add destination "https://github.com/${DEST_ORG}/${DEST_REPO}.git"

          git push destination master --force
          git push destination --tags --force
