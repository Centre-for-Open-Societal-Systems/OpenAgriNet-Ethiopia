name: Deploy OpenAgriNet (Frontend + Backend)

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # stop on any error

            echo "[DEPLOY] Navigating to OpenAgriNet repo"
            cd /home/ec2-user/OpenAgriNet

            echo "[DEPLOY] Fetching latest staging branch"
            git fetch origin
            git reset --hard origin/staging

            echo "[DEPLOY] Updating frontend"
            sudo rm -rf /usr/share/nginx/html/openagri/*
            sudo cp -r frontend/* /usr/share/nginx/html/openagri/
            sudo systemctl reload nginx
            echo "[DEPLOY] Frontend deployed"

            echo "[DEPLOY] Building and running backend container"
            cd backend
            docker-compose -f ../docker-compose.yml up --build -d backend
            echo "[DEPLOY] Backend deployed"